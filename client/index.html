<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Colab Editor</title>
    <style>
      body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
      .field { margin-bottom: 15px; }
      label { display: block; font-weight: bold; }
      input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
      textarea { height: 200px; }
      .version { color: #888; font-size: 0.8em; }
      button { padding: 10px 20px; cursor: pointer; }
      .mode-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; color: white; font-weight: bold; }
      .mode-view { background-color: #2196F3; }
      .mode-edit { background-color: #FF9800; }
    </style>
  </head>

</html>
